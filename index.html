<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planejamento Financeiro</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- ✅ Firebase PRIMEIRO, antes de tudo -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <!-- Chart.js depois -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>

  <div class="bg-dots"></div>

  <!-- TELA DE LOGIN -->
  <div id="tela-login">
    <div class="login-box">
      <div class="login-logo">PF</div>
      <h2 class="login-titulo">Planejamento<br><em>Financeiro</em></h2>
      <p class="login-sub">Faça login para continuar</p>
      <div class="login-form">
        <div class="input-wrap">
          <label>E-mail</label>
          <input type="email" id="login-usuario" placeholder="exemplo@email.com" autocomplete="off">
        </div>
        <div class="input-wrap">
        </div>
        
        <div class="input-wrap">
          <label>Senha</label>
          <input type="password" id="login-senha" placeholder="No mínimo 6 caracteres">
        </div>
        <p id="login-erro" class="login-erro"></p>
        <button class="btn-login" onclick="fazerLogin()">Entrar</button>
        <button class="btn-cadastrar" onclick="cadastrar()">Criar nova conta</button>
      </div>
    </div>
  </div>

  <!-- APP PRINCIPAL -->
  <main id="app" class="container hidden">

    <header class="header">
      <div class="header-top">
        <div class="logo-mark">PF</div>
        <span class="header-subtitle">PLANEJAMENTO FINANCEIRO</span>
        <button class="btn-sair" onclick="fazerLogout()">Sair</button>
      </div>
      <h1 class="headline">Planejamento financeiro,<br><em>sob controle.</em></h1>
    </header>

    <nav class="tabs">
      <button class="tab active" onclick="mudarAba('principal')">Principal</button>
      <button class="tab" onclick="mudarAba('transacoes')">
        Transações <span id="badge-count" class="tab-badge">0</span>
      </button>
      <button class="tab" onclick="mudarAba('graficos')">Gráficos</button>
    </nav>

    <!-- ABA 1: PRINCIPAL -->
    <div id="aba-principal" class="aba">
      <div class="form-card">
        <div class="input-wrap full">
          <label>Descrição</label>
          <input type="text" id="descricao" placeholder="Ex: Salário, Mercado, Netflix…" maxlength="50" autocomplete="off">
        </div>
        <div class="input-wrap">
          <label>Valor (R$)</label>
          <input type="number" id="valor" placeholder="0,00" min="0" step="0.01">
        </div>
        <div class="input-wrap">
          <label>Mês/Ano</label>
          <input type="month" id="mes-ano">
        </div>
        <div class="input-wrap">
          <label>Tipo</label>
          <select id="tipo">
            <option value="entrada">Entrada</option>
            <option value="saida">Saída</option>
          </select>
        </div>
        <!-- CATEGORIAS-->
        <div class="input-wrap">
  <label>Tipo</label>
  <select id="tipo">
    <option value="entrada">Entrada</option>
    <option value="saida">Saída</option>
  </select>
</div>

<div class="input-wrap">
  <label>Categoria</label>
  <select id="categoria">
    <optgroup label="Entradas">
      <option value="Salário">Salário</option>
      <option value="Freelance">Freelance</option>
      <option value="Investimentos">Investimentos</option>
      <option value="Outros (entrada)">Outros</option>
    </optgroup>
    <optgroup label="Saídas">
      <option value="Alimentação">Alimentação</option>
      <option value="Moradia">Moradia</option>
      <option value="Transporte">Transporte</option>
      <option value="Saúde">Saúde</option>
      <option value="Educação">Educação</option>
      <option value="Lazer">Lazer</option>
      <option value="Assinaturas">Assinaturas</option>
      <option value="Outros (saída)">Outros</option>
    </optgroup>
  </select>
</div>
        <button class="btn-add" onclick="adicionarTransacao()">
          <span>+</span> Adicionar transação
        </button>
      </div>
    </div>

    <!-- ABA 2: TRANSAÇÕES -->
    <div id="aba-transacoes" class="aba hidden">
      <div class="resumo-grid">
        <div class="card card-saldo">
          <span class="card-label">Saldo total</span>
          <span id="saldo" class="card-valor saldo-neutro">R$ 0,00</span>
        </div>
        <div class="card card-entrada">
          <span class="card-label">↑ Entradas</span>
          <span id="total-entradas" class="card-valor">R$ 0,00</span>
        </div>
        <div class="card card-saida">
          <span class="card-label">↓ Saídas</span>
          <span id="total-saidas" class="card-valor">R$ 0,00</span>
        </div>
      </div>
      <div class="lista-topo">
        <h2>Histórico</h2>
        <button class="btn-limpar" onclick="limparTudo()">Limpar tudo</button>
      </div>
      <div id="historico"></div>
    </div>

    <!-- ABA 3: GRÁFICOS -->
    <div id="aba-graficos" class="aba hidden">
      <div class="graficos-wrap">
        <div class="grafico-card">
          <div class="grafico-titulo">Entradas vs Saídas por mês</div>
          <div style="position:relative; height:260px;">
            <canvas id="chart-barras"></canvas>
          </div>
        </div>
        <div class="grafico-card">
          <div class="grafico-titulo">Distribuição geral</div>
          <div style="position:relative; height:240px;">
            <canvas id="chart-pizza"></canvas>
          </div>
        </div>
        <div class="grafico-card">
          <div class="grafico-titulo">Evolução do saldo</div>
          <div style="position:relative; height:240px;">
            <canvas id="chart-linha"></canvas>
          </div>
        </div>
        <div class="grafico-card">
          <div class="grafico-titulo">Gastos por categorias</div>
          <div style="position:relative; height:260px;">
            <canvas id="chart-categorias"></canvas>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- ✅ script.js UMA SÓ VEZ, por último -->
  <script src="script.js"></script>

</body>
</html>
